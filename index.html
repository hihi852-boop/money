<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>記數易 - AI 專業版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #5AC8FA; --accent: #34C759; --bg: #F0F9F9; --card-bg: #ffffff; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px 20px 100px 20px; color: #2c3e50; }
        
        /* Header */
        .header-card { background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 25px 20px; border-radius: 30px; color: white; text-align: center; box-shadow: 0 10px 25px rgba(52,199,89,0.2); margin-bottom: 25px; }
        .total-amount { font-size: 2.2rem; font-weight: 800; margin-top: 5px; }

        .glass-card { background: var(--card-bg); border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        h3 { font-size: 1rem; margin: 0 0 15px 0; color: #555; display: flex; justify-content: space-between; align-items: center; }

        /* 日曆 */
        .cal-nav-wrapper { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .cal-nav-btn { background: #e8f4f4; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; justify-content: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-head { font-size: 0.7rem; color: #999; padding-bottom: 5px; }
        .cal-cell { aspect-ratio: 1; border-radius: 12px; background: #f8fcfc; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.85rem; border: 1px solid #f0f5f5; cursor: pointer; }
        .cal-cell.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cal-cell.today { border: 2px solid var(--accent); font-weight: bold; }
        .cal-amt { font-size: 0.55rem; color: #ff3b30; margin-top: 2px; height: 12px; font-weight: bold; }
        .cal-cell.active .cal-amt { color: white; }

        /* AI 掃描區域 */
        #ocrResultUI { background: #f1f8f8; padding: 15px; border-radius: 18px; margin-top: 15px; border: 1px dashed var(--primary); }
        .img-preview { width: 100%; max-height: 150px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; background: #000; }
        .candidate-pool { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .chip { background: white; border: 1px solid var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .chip:active { background: var(--primary); color: white; }

        input, select { background: #f1f8f8; border: 2px solid transparent; padding: 15px; border-radius: 18px; width: 100%; margin-bottom: 12px; box-sizing: border-box; font-size: 1rem; }
        .btn { border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-ocr { background: var(--primary); color: white; margin-bottom: 10px; }

        /* 清單 */
        .list-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f7f7; }
        .icon-circle { width: 45px; height: 45px; background: #e8f4f4; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 1.3rem; }
        .item-info { flex-grow: 1; }
        .item-note { font-weight: 600; }
        .item-sub { font-size: 0.8rem; color: #99abb0; }
        .item-amt { font-weight: 700; color: #ff3b30; }
        .delete-btn { font-size: 0.75rem; color: #ff3b30; background: #fff0f0; padding: 4px 8px; border-radius: 8px; margin-top: 5px; width: fit-content; }

        .chart-wrap { height: 200px; }
        .hide { display: none; }
    </style>
</head>
<body>

<div class="header-card">
    <span id="cycleLabel">支出統計</span>
    <div class="total-amount">HKD $<span id="totalDisplay">0</span></div>
</div>

<div class="glass-card">
    <div class="cal-nav-wrapper">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
        <div style="text-align: center;">
            <div style="font-weight: 800;" id="calMonthDisplay"></div>
            <div id="calSelectedDateText" style="font-size: 0.7rem; color: var(--primary);">撳日期可過濾明細</div>
        </div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid">
        <div class="cal-day-head">日</div><div class="cal-day-head">一</div><div class="cal-day-head">二</div><div class="cal-day-head">三</div><div class="cal-day-head">四</div><div class="cal-day-head">五</div><div class="cal-day-head">六</div>
    </div>
    <button class="btn" style="background:#E5E5EA; margin-top:10px; padding:8px; font-size:0.8rem;" onclick="clearDateFilter()">顯示全月數據</button>
</div>

<div class="glass-card">
    <h3>📸 AI 影像入帳</h3>
    <button class="btn btn-ocr" onclick="document.getElementById('ocrFile').click()">📤 上傳/拍攝收據截圖</button>
    <input type="file" id="ocrFile" accept="image/*" style="display:none" onchange="handleOCR(event)">
    <div id="ocrStatus" style="font-size: 0.8rem; text-align: center; color: var(--primary);"></div>
    
    <div id="ocrResultUI" class="hide">
        <img id="imgPreview" class="img-preview">
        <div style="font-size: 0.75rem; font-weight: bold; color: #666;">點選以下文字填入表格：</div>
        <div id="wordPool" class="candidate-pool"></div>
    </div>
</div>

<div class="glass-card">
    <h3>📊 支出比例</h3>
    <div class="chart-wrap"><canvas id="expenseChart"></canvas></div>
</div>

<div class="glass-card" id="inputForm">
    <h3>📝 新增入數</h3>
    <input type="date" id="dateInput">
    <input type="text" id="note" placeholder="項目 (例如：午餐)">
    <input type="number" id="amt" placeholder="金額 HKD $" inputmode="decimal">
    <select id="catSelect"></select>
    <button class="btn btn-main" onclick="add()">儲存紀錄</button>
</div>

<div class="glass-card">
    <h3>🗓️ <span id="listTitle">最近消費明細</span></h3>
    <div id="recordList"></div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('myExp_V9_Final')) || [];
    let categories = JSON.parse(localStorage.getItem('myCats_V9')) || ['🍱 食飯', '🚌 交通', '🛍️ 買嘢', '🎮 娛樂', '❓ 其他'];
    let myChart = null;
    let viewDate = new Date();
    let filterDateStr = null; // 用嚟儲存點選左邊日

    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

    function updateUI() {
        // 更新分類選單
        const select = document.getElementById('catSelect');
        select.innerHTML = '';
        categories.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);

        // 計算全月/過濾數據
        const startDay = parseInt(localStorage.getItem('startDay')) || 1;
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        
        let filteredRecords = records.filter(r => {
            const rd = new Date(r.date);
            const isSameMonth = rd.getFullYear() === year && rd.getMonth() === month;
            if (filterDateStr) {
                return r.date.startsWith(filterDateStr);
            }
            return isSameMonth;
        }).sort((a,b) => new Date(b.date) - new Date(a.date));

        // 計算統計
        let total = 0;
        const stats = {}; categories.forEach(c => stats[c] = 0);
        const list = document.getElementById('recordList');
        list.innerHTML = '';

        filteredRecords.forEach(re => {
            total += parseFloat(re.amount);
            if(stats[re.category] !== undefined) stats[re.category] += parseFloat(re.amount);
            list.innerHTML += `
                <div class="list-item">
                    <div class="icon-circle">💰</div>
                    <div class="item-info">
                        <div class="item-note">${re.note || re.category}</div>
                        <div class="item-sub">${re.category} | ${new Date(re.date).toLocaleDateString()}</div>
                    </div>
                    <div class="item-right" style="text-align:right">
                        <div class="item-amt">-HKD $${parseFloat(re.amount).toLocaleString()}</div>
                        <div class="delete-btn" onclick="deleteItem('${re.date}')">取消</div>
                    </div>
                </div>`;
        });

        document.getElementById('totalDisplay').innerText = total.toLocaleString();
        document.getElementById('listTitle').innerText = filterDateStr ? `${filterDateStr} 消費明細` : `本月消費明細`;
        
        renderCalendar(year, month);
        drawChart(stats);
        localStorage.setItem('myExp_V9_Final', JSON.stringify(records));
    }

    // 功能 1: 日曆點選
    function renderCalendar(year, month) {
        document.getElementById('calMonthDisplay').innerText = `${year}年 ${month+1}月`;
        const grid = document.getElementById('calendarGrid');
        while(grid.children.length > 7) grid.removeChild(grid.lastChild);
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayTotal = records.reduce((s, r) => r.date.startsWith(dateStr) ? s + parseFloat(r.amount) : s, 0);
            
            const isToday = (new Date().toISOString().startsWith(dateStr));
            const isActive = filterDateStr === dateStr;

            const cell = document.createElement('div');
            cell.className = `cal-cell ${isToday?'today':''} ${isActive?'active':''}`;
            cell.innerHTML = `<div>${d}</div><div class="cal-amt">${dayTotal > 0 ? '$'+Math.round(dayTotal) : ''}</div>`;
            cell.onclick = () => {
                filterDateStr = dateStr;
                updateUI();
                window.scrollTo({top: 1000, behavior: 'smooth'});
            };
            grid.appendChild(cell);
        }
    }

    function clearDateFilter() {
        filterDateStr = null;
        updateUI();
    }

    // 功能 2: AI OCR 點選入帳
    async function handleOCR(event) {
        const file = event.target.files[0];
        if (!file) return;

        const status = document.getElementById('ocrStatus');
        const ui = document.getElementById('ocrResultUI');
        const imgPre = document.getElementById('imgPreview');
        const pool = document.getElementById('wordPool');

        status.innerText = "🔍 AI 正在閱讀圖片 (約 5-10 秒)...";
        ui.classList.add('hide');
        imgPre.src = URL.createObjectURL(file);

        try {
            const result = await Tesseract.recognize(file, 'eng+chi_tra');
            const words = result.data.text.split(/\s+/).filter(w => w.length > 1);
            
            pool.innerHTML = "";
            words.forEach(word => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = word;
                chip.onclick = () => {
                    // 如果係數字就入金額，如果係字就入備註
                    if (!isNaN(word.replace('$',''))) {
                        document.getElementById('amt').value = word.replace('$','');
                    } else {
                        document.getElementById('note').value = word;
                    }
                    window.scrollTo({top: 800, behavior: 'smooth'});
                };
                pool.appendChild(chip);
            });

            status.innerText = "✅ 掃描完成！請點選下方文字填入表格。";
            ui.classList.remove('hide');
        } catch (e) {
            status.innerText = "❌ 掃描失敗，請重試。";
        }
    }

    function drawChart(stats) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (myChart) myChart.destroy();
        const hasData = Object.values(stats).some(v => v > 0);
        if (!hasData) { ctx.clearRect(0,0,400,400); return; }

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: Object.keys(stats), 
                datasets: [{ data: Object.values(stats), backgroundColor: ['#5AC8FA', '#34C759', '#FFCC00', '#FF3B30', '#AF52DE', '#FF9500'], borderWidth: 0 }] 
            },
            options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    function add() {
        const d = document.getElementById('dateInput').value;
        const n = document.getElementById('note').value;
        const a = document.getElementById('amt').value;
        const c = document.getElementById('catSelect').value;
        if (!a) return alert('入埋錢先！');
        
        // 確保儲存格式一致 YYYY-MM-DDTHH:mm:ss
        let fD = new Date(d);
        const now = new Date();
        fD.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
        
        records.unshift({ note: n, amount: a, category: c, date: fD.toISOString() });
        document.getElementById('note').value = ''; 
        document.getElementById('amt').value = '';
        updateUI();
    }

    function deleteItem(ts) {
        if(confirm('真係要刪除呢筆紀錄？')) {
            records = records.filter(r => r.date !== ts);
            updateUI();
        }
    }

    function changeMonth(o) { viewDate.setMonth(viewDate.getMonth() + o); filterDateStr = null; updateUI(); }
    function clearAll() { if(confirm('⚠️ 刪除所有數據？')) { records = []; updateUI(); } }

    updateUI();
</script>

</body>
</html>
